root {
  --gutter: 5px;
}
			
								
.app {
  padding: var(--gutter) 0;
  display: grid;
  grid-gap: var(--gutter) 0;
  grid-template-columns: var(--gutter) 1fr var(--gutter);
  align-content: start;
}

.app > * {
  grid-column: 2 / -2;
}

.app > .full {
  grid-column: 1 / -1;
}


.app {
  width: 100%;
  height: 100%;
  background: #fff;
  overflow-y: scroll;
}
			
.hs {
  display: grid;
  grid-gap: 10px;
  grid-template-columns:
    10px
    repeat(15, calc(85% - 40px))
    10px;
  grid-template-rows: minmax(150px, 1fr);
}
.hs:before,
.hs:after {
  content: '';
  width: 10px;
}

/* Demo styles */


ul {
  list-style: none;
  padding: 0;
}


.app {
  width: 100%;

}

}

 object-fit: cover;

* {box-sizing: border-box}
.mySlides {
    display: none;
}

/* Slideshow container */
.slideshow-container {
	max-width: 100%;
  position: relative;
  margin: auto;
}

.prev,
.next {
  cursor: pointer;
  position: absolute;
  top: 25%;
  width: auto;
  margin-top: -28px;
  padding: 10px;
  color: slategrey;
  font-weight: normal;
  font-size: 16px;
  transition: 0.6s ease;
  border-radius: 0 3px 3px 0;
}

/* Position the "next button" to the right */
.next {
  right: 0;
  border-radius: 3px 3px 0 3px;
}

/* On hover, add a grey background color */
.prev:hover, .next:hover {
  background-color: #f1f1f1;
  color: black;
}

/* Caption text */
.text {
  color: #f2f2f2;
  font-size: 15px;
  padding: 8px 12px;
  position: absolute;
  bottom: 8px;
  width: 100%;
  text-align: center;
}			
			
/* Number text (1/3 etc) */
.numbertext {
  color: #000000;
  font-size: 12px;
  padding: 8px 12px;
  position: absolute;
  top: 0;
}			
			
			
/* The dots/bullets/indicators */
.dot {
  cursor: pointer;
  height: 20px;
  width: 20px;
  margin: 0 6px;
  background-color: #bbb;
  border-radius: 50%;
  align: left; 
	display: inline-block;
  transition: background-color 0.6s ease;
}

.active, .dot:hover {
  background-color: #717171;
}

/* Fading animation */
.fade {
  -webkit-animation-name: fade;
  -webkit-animation-duration: 1.5s;
  animation-name: fade;
  animation-duration: 1.5s;
}

@-webkit-keyframes fade {
  from {opacity: .4} 
  to {opacity: 1}
}

@keyframes fade {
  from {opacity: .4} 
  to {opacity: 1}
}
